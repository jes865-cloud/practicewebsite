<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Log In</h1>
    <p>Enter your email and password to log in.</p>

    <form id="loginForm" novalidate>
      <div class="field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" name="loginEmail" placeholder="Enter your email" />
        <small class="message"></small>
      </div>

      <div class="field">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" name="loginPassword" placeholder="Enter your password" />
        <small class="message"></small>
      </div>

      <button type="submit">Log In</button>

      <p class="switch-text">
        Forgot your password?
        <a href="forgot-password.html">Request a password change</a>
      </p>
    </form>

    <p class="switch-text">
      Do not have an account?
      <a href="index.html">Sign up here</a>
    </p>
  </div>

  <script defer src="common.js"></script>
  <script defer src="login.js"></script>
</body>
</html>
