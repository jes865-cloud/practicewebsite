<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Request Password Change</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Password Change Request</h1>
    <p>Submit a request for an administrator to change your password.</p>

    <form id="passwordChangeRequestForm" novalidate>
      <div class="field">
        <label for="requestEmail">Email</label>
        <input type="email" id="requestEmail" name="requestEmail" placeholder="Enter your email" />
        <small class="message"></small>
      </div>

      <div class="field">
        <label for="requestPhoneNumber">Phone Number</label>
        <input type="text" id="requestPhoneNumber" name="requestPhoneNumber" placeholder="Enter your phone number" />
        <small class="message"></small>
      </div>

      <div class="field">
        <label for="newRequestedPassword">New Password</label>
        <input type="password" id="newRequestedPassword" name="newRequestedPassword" placeholder="Enter new password" />
        <small class="message"></small>
      </div>

      <div class="field">
        <label for="confirmRequestedPassword">Confirm New Password</label>
        <input type="password" id="confirmRequestedPassword" name="confirmRequestedPassword" placeholder="Confirm new password" />
        <small class="message"></small>
      </div>

      <button type="submit">Submit Password Change Request</button>
    </form>

    <p class="switch-text">
      Back to
      <a href="login.html">Log in</a>
    </p>
  </div>

  <script defer src="common.js"></script>
  <script defer src="forgot-password.js"></script>
</body>
</html>
